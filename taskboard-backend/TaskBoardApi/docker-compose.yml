version: '3.8'

services:
  api:
    build: .
    container_name: taskboard-api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - ASPNETCORE_URLS=http://+:8000
      - DOTNET_ENVIRONMENT=Development
    networks:
      - tasknet

  redis:
    image: redis:latest
    container_name: taskboard-redis
    ports:
      - "6379:6379"
    networks:
      - tasknet

networks:
  tasknet:
